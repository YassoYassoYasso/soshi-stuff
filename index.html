<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Project Ascendancy - EU</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#ffb3ad",
                        "surface-container-highest": "#353535",
                        "on-primary-fixed": "#410003",
                        "on-secondary-fixed": "#261a00",
                        "tertiary-fixed": "#ffdbd1",
                        "surface": "#131313",
                        "secondary-fixed-dim": "#fbbc00",
                        "secondary": "#ffe2ab",
                        "surface-container-lowest": "#0e0e0e",
                        "inverse-on-surface": "#313030",
                        "error": "#ffb4ab",
                        "on-background": "#e5e2e1",
                        "on-tertiary": "#601400",
                        "surface-container-high": "#2a2a2a",
                        "tertiary-fixed-dim": "#ffb5a0",
                        "on-tertiary-container": "#ffe1da",
                        "tertiary-container": "#c23200",
                        "tertiary": "#ffb5a0",
                        "outline-variant": "#5d3f3d",
                        "surface-variant": "#353535",
                        "background": "#131313",
                        "on-error-container": "#ffdad6",
                        "error-container": "#93000a",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#e6bdb9",
                        "on-tertiary-fixed": "#3b0900",
                        "inverse-surface": "#e5e2e1",
                        "inverse-primary": "#c00019",
                        "primary": "#ffb3ad",
                        "primary-fixed-dim": "#ffb3ad",
                        "surface-bright": "#393939",
                        "on-primary-fixed-variant": "#930010",
                        "surface-dim": "#131313",
                        "surface-container-low": "#1c1b1b",
                        "secondary-container": "#ffbf00",
                        "on-secondary-fixed-variant": "#5c4300",
                        "secondary-fixed": "#ffdfa0",
                        "on-primary-container": "#ffe1de",
                        "outline": "#ad8884",
                        "on-error": "#690005",
                        "on-secondary": "#402d00",
                        "on-secondary-container": "#6d5000",
                        "on-primary": "#680008",
                        "on-tertiary-fixed-variant": "#872000",
                        "primary-fixed": "#ffdad6",
                        "surface-container": "#20201f",
                        "primary-container": "#cf1020"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "safe-margin": "2rem",
                        "stack-md": "1.5rem",
                        "stack-xs": "0.5rem",
                        "grid-gutter": "2rem",
                        "stack-lg": "3rem"
                    },
                    "fontFamily": {
                        "display-xl": ["Anton"],
                        "data-label": ["JetBrains Mono"],
                        "headline-lg": ["Anton"],
                        "body-md": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Anton"],
                        "button-text": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "display-xl": ["64px", {"lineHeight": "1.1", "letterSpacing": "0.02em", "fontWeight": "400"}],
                        "data-label": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.1em", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "400"}],
                        "button-text": ["14px", {"lineHeight": "1", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #131313;
            background-image: radial-gradient(circle at 50% 50%, rgba(207, 16, 32, 0.05) 0%, rgba(19, 19, 19, 1) 100%);
            color: #e5e2e1;
        }
        
        .eu-card {
            background: rgba(20, 26, 33, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(61, 80, 93, 0.5);
            box-shadow: inset 0 0 10px rgba(16, 137, 207, 0.2), 0 4px 20px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        
        .eu-card:hover {
            border-color: rgba(16, 175, 207, 0.8);
            box-shadow: inset 0 0 15px rgba(16, 175, 207, 0.4), 0 0 20px rgba(0, 191, 255, 0.2);
            transform: translateY(-2px);
        }
        .gm-card-eu {
            background: rgba(25, 15, 30, 0.85);
            backdrop-filter: blur(16px);
            border: 2px solid rgba(187, 0, 255, 0.4);
            box-shadow: inset 0 0 20px rgba(187, 0, 255, 0.15), 0 6px 30px rgba(0,0,0,0.6);
            transition: all 0.4s ease;
        }

        .gm-card-eu:hover {
            border-color: rgba(187, 0, 255, 0.9);
            box-shadow: inset 0 0 30px rgba(187, 0, 255, 0.3), 0 0 25px rgba(187, 0, 255, 0.2);
            transform: translateY(-3px);
        }
        .ember {
            position: fixed;
            background: rgba(255, 69, 0, 0.6);
            width: 3px;
            height: 3px;
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
        }

        @keyframes heartbeat {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        .status-alive-dot {
            width: 12px;
            height: 12px;
            background-color: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: heartbeat 1.5s infinite;
            box-shadow: 0 0 8px #4ade80;
        }

        .back-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #b9dbe6; 
            opacity: 0.75;
            text-decoration: none;
            transition: opacity .25s ease, color .25s ease;
        }
        .back-link:hover { opacity: 1; color: #00d5ff; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-on-surface antialiased overflow-x-hidden relative">
    <div class="fixed inset-0 pointer-events-none z-0" id="Fuckassembers"></div>

    <nav class="relative z-20 w-full max-w-7xl mx-auto px-safe-margin pt-8 flex items-center justify-between">
        <span class="font-data-label text-data-label uppercase text-[#80d8ff] opacity-60 tracking-widest">Season 10 &middot; EU</span>
        <a class="back-link" href="#">Hall of Ascendants (WIP) &rarr;</a>
    </nav>

    <main class="flex-grow z-10 w-full max-w-7xl mx-auto px-safe-margin py-stack-lg">
        <header class="mb-stack-lg text-center">
            <h1 class="font-display-xl text-display-xl text-[#80d8ff] mb-stack-xs tracking-tighter uppercase drop-shadow-[0_0_10px_rgba(128,216,255,0.3)]">Project Ascendancy Roster</h1>
            <p class="font-data-label text-data-label text-[#b9dbe6] uppercase">Season 10: EU</p>
        </header>

        <div class="mb-stack-lg flex justify-center w-full max-w-3xl mx-auto">
            <div class="gm-card-eu rounded-xl p-stack-lg flex flex-col md:flex-row items-center gap-8 w-full relative overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-br from-[#bb00ff]/10 to-transparent pointer-events-none opacity-50 group-hover:opacity-100 transition-opacity"></div>
                
                <div class="w-[180px] h-[180px] shrink-0 rounded-full border-4 border-[#bb00ff]/60 overflow-hidden shadow-[inset_0_0_20px_rgba(187,0,255,0.4),0_0_15px_rgba(187,0,255,0.2)] bg-surface z-10">
                    <img src="Blaze.webp" alt="Game Master" class="w-full h-full object-cover">
                </div>
                
                <div class="z-10 flex flex-col text-center md:text-left w-full">
                    <h3 class="font-data-label text-data-label text-[#e580ff] mb-2 flex items-center justify-center md:justify-start gap-2 uppercase tracking-widest drop-shadow-[0_0_5px_rgba(187,0,255,0.5)]">
                        <span class="material-symbols-outlined text-[16px]">visibility</span> The Game Master
                    </h3>
                    <h2 class="font-display-xl text-[48px] text-[#f4d4ff] uppercase tracking-wide mb-2 leading-none">BLAZE</h2>
                    <p class="font-body-md text-on-surface-variant mb-4">Overseer and Game Master of Project Ascendancy.</p>
                    
                    <div class="mt-auto pt-4 border-t border-[#bb00ff]/20 flex items-center justify-center md:justify-start gap-3">
                        <div class="status-alive-dot"></div>
                        <span class="font-data-label text-data-label text-on-surface-variant uppercase tracking-wider">Status: Online & Watching</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            <script>
                const euRoster = [
                    { name: "Soshi", teammate: "UNKOWN", moveset: ["Bakugo"], avatar: "SoshiIcon.webp", icon: "New_Bakugo_Icon.webp" },
                    { name: "Entity", teammate: "UNKOWN", moveset: ["Stain v2"], avatar: "Entity.webp", icon: "Stainv2Icon.webp" },
                    { name: "Drago", teammate: "UNKOWN", moveset: ["Deku v2"], avatar: "drago.webp", icon: "New_Deku_V2_Icon.webp" },
                    { name: "Ayanami", teammate: "UNKOWN", moveset: ["Dabi v2"], avatar: "Ayanami.webp", icon: "New_Dabi_V2_Icon.webp" },
                    { name: "Okkotsu", teammate: "UNKOWN", moveset: ["Dabi v1"], avatar: "Okkotsu.webp", icon: "New_Dabi_Icon.webp" },
                    { name: "Hex", teammate: "UNKOWN", moveset: ["Hawks"], avatar: "Hex.webp", icon: "WingedAssassinIcon.webp" },
                    { name: "Riot", teammate: "UNKOWN", moveset: ["Dabi v1"], avatar: "Riot.webp", icon: "New_Dabi_Icon.webp" },
                    { name: "Icarus", teammate: "UNKOWN", moveset: ["Stain v2"], avatar: "Icarus.webp", icon: "Stainv2Icon.webp" },
                    { name: "Yasso", teammate: "UNKOWN", moveset: ["Stain v2"], avatar: "yasso.webp", icon: "Stainv2Icon.webp" },
                    { name: "Sunny", teammate: "UNKOWN", moveset: ["Shigaraki"], avatar: "Sunny.webp", icon: "Shigaraki.png" },
                    { name: "Rabbit", teammate: "UNKOWN", moveset: ["Dabi v2"], avatar: "Rabbit.webp", icon: "New_Dabi_V2_Icon.webp" },
                    { name: "Ducky", teammate: "UNKOWN", moveset: ["Dabi v2"], avatar: "Ducky.webp", icon: "New_Dabi_V2_Icon.webp" },
                    { name: "jfvwwxj ", teammate: "UNKOWN", moveset: ["Todoroki v1"], avatar: "jv.webp", icon: "New_Todoroki_Icon.webp" },
                ];

                const grid = document.querySelector('.grid');
                
                euRoster.forEach((player) => {
                    const playercard = document.createElement('div');
                    
                    playercard.className = 'eu-card rounded-xl p-stack-md flex flex-col gap-stack-md relative overflow-hidden group';
                    playercard.innerHTML = `
                        <div class="absolute inset-0 bg-gradient-to-br from-[#1089cf]/10 to-transparent pointer-events-none opacity-50 group-hover:opacity-100 transition-opacity"></div>
                        
                        <div class="flex items-start justify-between z-10">
                            <div class="w-[150px] h-[150px] rounded-lg border border-[#3d505d]/50 overflow-hidden shadow-[inset_0_0_10px_rgba(16,137,207,0.3)] bg-surface-container">
                                <img src="${player.avatar || 'images/default-avatar.jpg'}" alt="${player.name} Portrait" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500">
                            </div>
                            
                            <div class="w-[90px] h-[90px] rounded-full border border-[#1089cf]/50 overflow-hidden flex items-center justify-center bg-surface-container shadow-[inset_0_0_15px_rgba(16,137,207,0.4)]">
                                <img src="${player.icon || 'images/default-icon.png'}" alt="${player.name} Icon" class="w-full h-full object-cover opacity-80 mix-blend-screen">
                            </div>
                        </div>

                        <div class="z-10 mt-stack-xs border-t border-[#3d505d]/30 pt-stack-xs flex-grow flex flex-col">
                            <h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-[#00d5ff] uppercase tracking-wide mb-2">${player.name}</h2>
                            
                            <div class="space-y-4 mt-stack-md flex-grow flex flex-col">
                                <div>
                                    <h3 class="font-data-label text-data-label text-[#80d8ff] mb-1 uppercase opacity-80">Teammate</h3>
                                    <p class="font-body-md text-on-surface-variant">${player.teammate}</p>
                                </div>
                                
                                <div class="flex-grow">
                                    <h3 class="font-data-label text-data-label text-[#80d8ff] mb-2 uppercase opacity-80 flex items-center gap-2">
                                        <span class="material-symbols-outlined text-[14px]">swords</span> Moveset
                                    </h3>
                                    <ul class="flex flex-wrap gap-2">
                                        ${player.moveset.map(move => `
                                            <li class="bg-[#1a232c] border border-[#1089cf]/40 rounded px-3 py-1 font-data-label text-data-label text-[#00d5ff] whitespace-nowrap shadow-[inset_0_0_5px_rgba(16,137,207,0.2)]">
                                                ${move}
                                            </li>
                                        `).join('')}
                                    </ul>
                                </div>
                                
                                <div class="flex items-center gap-3 pt-3 mt-auto border-t border-[#3d505d]/30">
                                    <div class="status-alive-dot"></div>
                                    <span class="font-data-label text-data-label text-on-surface-variant uppercase tracking-wider">Status: Alive</span>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(playercard);
                });
                
                const embersContainer = document.getElementById('Fuckassembers');
                for(let i=0; i<30; i++) {
                    let ember = document.createElement('div');
                    ember.className = 'ember';
                    ember.style.left = `${Math.random() * 100}vw`;
                    ember.style.animationDuration = `${5 + Math.random() * 10}s`;
                    ember.style.animationDelay = `${Math.random() * 5}s`;
                    ember.style.opacity = Math.random() * 0.5 + 0.1;
                        embersContainer.appendChild(ember);
                }
            </script>
        </div>
    </main>

    <footer class="bg-surface-container-lowest w-full py-12 mt-stack-lg border-t border-[#3d505d]/30 z-10 flex flex-col items-center justify-center gap-stack-xs px-safe-margin">
        <h2 class="font-headline-lg text-headline-lg text-[#80d8ff] tracking-tighter uppercase mb-4 drop-shadow-[0_0_10px_rgba(128,216,255,0.2)]">PROJECT ASCENDANCY</h2>
        <nav class="flex flex-wrap justify-center gap-6 mb-6">
            <a class="font-data-label text-data-label uppercase text-on-surface-variant hover:text-[#00d5ff] transition-colors opacity-80 hover:opacity-100" href="https://discord.gg/xCyGjKtGy" target="_blank">Discord</a>
            <a class="font-data-label text-data-label uppercase text-on-surface-variant hover:text-[#00d5ff] transition-colors opacity-80 hover:opacity-100" href="https://www.youtube.com/@Soshi_kun" target="_blank">Youtube</a>
            <a class="font-data-label text-data-label uppercase text-on-surface-variant hover:text-[#00d5ff] transition-colors opacity-80 hover:opacity-100" href="#" target="_blank">TikTok</a>
        </nav>
        <p class="font-data-label text-data-label uppercase text-on-surface-variant opacity-60">Soshi's Realm.</p>
    </footer>
</body>
</html>
