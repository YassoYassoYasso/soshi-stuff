    <style>
        :root{
            --void:#0e0e0e;
            --ember-red:#cf1020;
            --ember-orange:#ff6a1a;
            --gold:#ffbf00;
            --gold-dim:#caa000;
            --eu-glow:#8fd6ff;
            --crack-gradient:linear-gradient(90deg, transparent, var(--gold) 15%, var(--ember-red) 50%, var(--gold) 85%, transparent);
        }

        body {
            background-color: #131313;
            background-image:
                radial-gradient(circle at 50% 0%, rgba(255,191,0,0.06) 0%, rgba(19,19,19,0) 45%),
                radial-gradient(circle at 50% 100%, rgba(207,16,32,0.08) 0%, rgba(19,19,19,1) 60%);
            color: #e5e2e1;
        }

        .ember { position:fixed; background:rgba(255,191,0,0.55); width:3px; height:3px; border-radius:50%; pointer-events:none; animation:float 12s infinite linear; }
        .ember.ember-red { background:rgba(255,69,0,0.55); }
        @keyframes float { 0%{transform:translateY(100vh) translateX(0); opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{transform:translateY(-10vh) translateX(24px); opacity:0;} }

        .back-link{
            font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.15em; text-transform:uppercase;
            color:#e6bdb9; opacity:0.75; text-decoration:none; transition:opacity .25s ease, color .25s ease;
        }
        .back-link:hover{ opacity:1; color:var(--gold); }

        .eyebrow{
            font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.4em; text-transform:uppercase;
            color:var(--gold-dim); opacity:0.9;
        }

        .hero-title{
            font-family:'Anton', sans-serif;
            font-size:clamp(44px, 9vw, 104px);
            letter-spacing:0.02em;
            text-transform:uppercase;
            line-height:1.05;
            background:linear-gradient(180deg, #fff4e6 0%, var(--gold) 42%, var(--ember-red) 100%);
            -webkit-background-clip:text;
            background-clip:text;
            color:transparent;
            filter:drop-shadow(0 0 30px rgba(255,110,30,0.3));
        }

        .hero-sub{
            font-family:'Hanken Grotesk', sans-serif;
            color:#c9c2c0; max-width:34rem; margin:1.25rem auto 0; opacity:0.85;
        }

        .hero-crackline{ width:min(640px, 80%); height:2px; background:var(--crack-gradient); margin:2rem auto; opacity:0.7; }

        .hero-rays{
            position:absolute; top:-160px; left:50%; transform:translateX(-50%);
            width:900px; height:900px; max-width:220vw; max-height:220vw;
            background:repeating-conic-gradient(from 0deg, rgba(255,191,0,0.06) 0deg 4deg, transparent 4deg 14deg);
            border-radius:50%;
            -webkit-mask-image:radial-gradient(circle, black 25%, transparent 70%);
            mask-image:radial-gradient(circle, black 25%, transparent 70%);
            opacity:0.7; pointer-events:none; z-index:-1;
            animation:rays-spin 160s linear infinite;
        }
        @keyframes rays-spin{ to{ transform:translateX(-50%) rotate(360deg); } }

        .hero-sigil{ width:52px; height:52px; margin:0 auto 0.75rem; filter:drop-shadow(0 0 10px rgba(255,191,0,0.5)); }
        .hero-sigil svg{ width:100%; height:100%; }
        .hero-sigil rect{ fill:none; stroke:var(--gold); stroke-width:2; }
        .hero-sigil path{ fill:var(--ember-red); }

        .season-block{ padding:4.5rem 0; position:relative; opacity:0; transform:translateY(24px); transition:opacity .8s ease, transform .8s ease; }
        .season-block.is-visible{ opacity:1; transform:translateY(0); }
        .season-block + .season-block{ border-top:1px solid rgba(255,191,0,0.08); }

        .season-divider{ display:flex; align-items:center; gap:1.5rem; margin-bottom:2.5rem; }
        .season-crackline{ flex:1; height:2px; background:var(--crack-gradient); opacity:0.6; }
        .season-sigil{ width:44px; height:44px; flex:none; filter:drop-shadow(0 0 8px rgba(255,191,0,0.45)); }
        .season-sigil svg{ width:100%; height:100%; }
        .season-sigil rect{ fill:none; stroke:var(--gold); stroke-width:2; opacity:0.85; }
        .season-sigil path{ fill:var(--ember-red); }

        .season-title-block{ text-align:center; margin-bottom:3.5rem; }
        .season-eyebrow{
            display:block; font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.5em;
            text-transform:uppercase; color:var(--gold-dim); opacity:0.9; margin-bottom:0.6rem;
        }
        .season-label{
            font-family:'Anton', sans-serif;
            font-size:clamp(32px, 5vw, 54px);
            letter-spacing:0.03em; text-transform:uppercase; line-height:1.1;
            background:linear-gradient(180deg, #fff4e6 0%, var(--gold) 45%, var(--ember-red) 110%);
            -webkit-background-clip:text; background-clip:text; color:transparent;
            filter:drop-shadow(0 0 20px rgba(255,110,30,0.25));
        }
        .season-subtitle{
            font-family:'Hanken Grotesk', sans-serif; font-style:italic; color:#c9c2c0;
            opacity:0.75; margin-top:0.6rem; font-size:14px;
        }

        .regions-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:3rem; }
        .region-block{ display:flex; flex-direction:column; gap:1.5rem; }
        .region-header{ display:flex; align-items:center; gap:0.75rem; }
        .region-flame{ width:9px; height:9px; border-radius:50%; background:var(--flame-color, var(--ember-red)); box-shadow:0 0 10px 3px var(--flame-color, var(--ember-red)); }
        .region-name{ font-family:'JetBrains Mono', monospace; font-size:13px; letter-spacing:0.3em; text-transform:uppercase; color:#e6bdb9; }
        .region-cards{ display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:1.5rem; }

        /* --accent / --accent-light / --accent-soft are set INLINE per card from each
           season+region's `gradient` array in the data below — these are just fallbacks
           in case a region is ever missing one. */
        .champion-card{
            --accent:var(--ember-red);
            --accent-light:#ffd9a0;
            --accent-soft:rgba(207,16,32,0.25);
            position:relative;
            background:linear-gradient(160deg, rgba(32,27,26,0.92), rgba(12,12,12,0.96));
            border:1px solid rgba(255,191,0,0.15);
            border-radius:0.75rem;
            padding:2.75rem 1.75rem 2.25rem;
            text-align:center;
            overflow:hidden;
            transition:transform .4s ease, box-shadow .4s ease, border-color .4s ease;
            box-shadow:0 8px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.4);
        }
        .champion-card::before{
            content:''; position:absolute; inset:0;
            background:radial-gradient(circle at 50% 0%, var(--accent-soft), transparent 60%);
            opacity:0.65; pointer-events:none;
        }
        .champion-card:hover{
            transform:translateY(-6px);
            border-color:var(--accent);
            box-shadow:0 14px 40px rgba(0,0,0,0.6), 0 0 30px var(--accent-soft), inset 0 0 25px var(--accent-soft);
        }

        .corner{ position:absolute; width:16px; height:16px; opacity:0.5; pointer-events:none; }
        .corner-tl{ top:12px; left:12px; border-top:2px solid var(--gold); border-left:2px solid var(--gold); }
        .corner-tr{ top:12px; right:12px; border-top:2px solid var(--gold); border-right:2px solid var(--gold); }
        .corner-bl{ bottom:12px; left:12px; border-bottom:2px solid var(--gold); border-left:2px solid var(--gold); }
        .corner-br{ bottom:12px; right:12px; border-bottom:2px solid var(--gold); border-right:2px solid var(--gold); }

        .crest{ position:relative; width:108px; height:122px; margin:0 auto 0.5rem; }
        .crest-glow{
            position:absolute; inset:-20px; border-radius:50%;
            background:radial-gradient(circle, var(--accent-soft), transparent 70%);
            filter:blur(3px);
            animation:crest-breathe 4.5s ease-in-out infinite;
        }
        .crest-shield-outer{
            position:absolute; inset:0;
            clip-path:polygon(50% 0%, 100% 18%, 100% 68%, 50% 100%, 0% 68%, 0% 18%);
            background:linear-gradient(160deg, var(--accent), var(--accent-light));
        }
        .crest-shield{
            position:absolute; inset:4px;
            clip-path:polygon(50% 0%, 100% 18%, 100% 68%, 50% 100%, 0% 68%, 0% 18%);
            overflow:hidden; background:#0e0e0e;
            box-shadow:inset 0 0 16px rgba(0,0,0,0.75);
        }
        .crest-shield img{ position:relative; width:100%; height:100%; object-fit:cover; }
        .crest-flame{ position:absolute; top:-18px; left:50%; transform:translateX(-50%); width:72px; height:auto; filter:drop-shadow(0 0 6px var(--accent)); }
        .crest-flame path{ fill:var(--accent); }
        @keyframes crest-breathe{ 0%,100%{ opacity:.5; transform:scale(1); } 50%{ opacity:.85; transform:scale(1.05); } }

        .rank-ribbon{
            display:inline-block; margin:0 auto 1.1rem; padding:0.4rem 1.4rem;
            font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.32em; text-transform:uppercase;
            color:#1a1310; font-weight:700;
            background:linear-gradient(135deg, var(--accent), var(--accent-light));
            clip-path:polygon(6% 0%, 94% 0%, 100% 50%, 94% 100%, 6% 100%, 0% 50%);
            box-shadow:0 4px 14px rgba(0,0,0,0.45);
        }

        .champion-name{ font-family:'Anton', sans-serif; font-size:26px; letter-spacing:0.02em; text-transform:uppercase; color:#f2ece9; }
        .champion-teammate{ font-family:'Hanken Grotesk', sans-serif; font-size:13px; color:#b8b2b0; margin-top:0.35rem; }
        .champion-teammate b{ color:var(--accent); font-weight:700; }
        .champion-title{
            margin-top:0.9rem; padding-top:0.9rem; border-top:1px solid rgba(255,255,255,0.07);
            font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#8f8886;
        }
        .card-pedestal{
            position:absolute; left:18%; right:18%; bottom:0; height:3px;
            background:linear-gradient(90deg, transparent, var(--accent), var(--accent-light));
            filter:blur(1px); opacity:0.85;
        }

        /* MISSING treatment — desaturating the whole card with one filter means it goes
           black-and-white regardless of whichever gradient that season/region was given,
           no color overrides needed. The stamp is the only new element. */
        .champion-card.is-missing{
            filter:grayscale(1) contrast(1.05) brightness(0.88);
        }
        .champion-card.is-missing .crest-glow{ animation:none; opacity:0.18; }
        .champion-card.is-missing .crest-flame{ opacity:0.35; }

        .missing-stamp{
            position:absolute;
            top:36%; left:50%;
            width:220%;
            transform:translate(-50%, -50%) rotate(-45deg);
            text-align:center;
            font-family:'Anton', sans-serif;
            font-size:24px;
            letter-spacing:0.5em;
            text-transform:uppercase;
            color:#f2f2f2;
            padding:0.5rem 0;
            border-top:3px solid rgba(242,242,242,0.85);
            border-bottom:3px solid rgba(242,242,242,0.85);
            background:rgba(0,0,0,0.35);
            text-shadow:0 2px 10px rgba(0,0,0,0.8);
            pointer-events:none;
            z-index:5;
        }

        @media (prefers-reduced-motion: reduce){
            .crest-glow{ animation:none; }
            .hero-rays{ animation:none; }
            .season-block{ transition:none; opacity:1; transform:none; }
            .ember{ animation:none; display:none; }
        }
    </style>
</head>

    <script>
        /* The idea here is to make a constant and each item inside the constant is going to be a
           season, and in each season there's an NA and EU region. Each region now also carries
           its own `gradient` — a 2-color array — so NA and EU (and every season) can each have
           their own distinct color mix without touching any CSS. That gradient drives the shield,
           the ribbon, the card glow, and the pedestal light all at once. */
        const hallOfAscendants = [
            {
                season: 0,
                subtitle: "The First Ascension",
                regions: {
                    NA: {
                        gradient: ["#ff5a2e", "#ffbf00"],
                        champions: [
                            { name: "Mugi", teammate: "Riot", title: "Duo Champions — Bakugo / Dabi v1", avatar: "mugis0.png" },
                            { name: "Riot", teammate: "Mugi", title: "Duo Champions — Dabi v1 / Bakugo", avatar: "RiotS0.png" }
                        ]
                    },
                    EU: {
                        gradient: ["#8fd6ff", "#eaf7ff"],
                        champions: [
                            { name: "Ashborn", teammate: "Corvid", title: "Duo Champions — Hawks / Kurogiri", avatar: "images/ashborn.jpg", missing: true },
                            { name: "Corvid", teammate: "Ashborn", title: "Duo Champions — Hawks / Kurogiri", avatar: "images/corvid.jpg" }
                        ]
                    }
                }
            },
            {
                season: 1,
                subtitle: "The Second Ascension",
                regions: {
                    NA: {
                        gradient: ["#ff5a2e", "#ffbf00"],
                        champions: [
                            { name: "Ferrow", teammate: "Quill", title: "Duo Champions — Dabi / Shigaraki", avatar: "images/ferrow.jpg" },
                            { name: "Quill", teammate: "Ferrow", title: "Duo Champions — Dabi / Shigaraki", avatar: "images/quill.jpg" }
                        ]
                    },
                    EU: {
                        gradient: ["#8fd6ff", "#eaf7ff"],
                        champions: [
                            { name: "Wraithe", teammate: "Halcyon", title: "Duo Champions — Stain v2 / Todoroki", avatar: "images/wraithe.jpg" },
                            { name: "Halcyon", teammate: "Wraithe", title: "Duo Champions — Stain v2 / Todoroki", avatar: "images/halcyon.jpg" }
                        ]
                    }
                }
            }

            /* The fuckass template in general is:
            ,{
                season: 2,
                subtitle: "The Third Ascension",
                regions: {
                    NA: {
                        gradient: ["#colorOne", "#colorTwo"],
                        champions: [
                            { name: "", teammate: "", title: "", avatar: "" },
                            { name: "", teammate: "", title: "", avatar: "", missing: true }
                        ]
                    },
                    EU: {
                        gradient: ["#colorOne", "#colorTwo"],
                        champions: [
                            { name: "", teammate: "", title: "", avatar: "" },
                            { name: "", teammate: "", title: "", avatar: "" }
                        ]
                    }
                }
            }
            */
            // Add `missing: true` to any champion object above and their card automatically
            // goes black-and-white with a "Missing" stamp across it — no other data needed.
        ];

        // Turns "#ff5a2e" into "rgba(255, 90, 46, alpha)" so every glow/soft-fill can be
        // derived straight from a region's gradient colors instead of being hardcoded.
        function hexToRgba(hex, alpha) {
            let c = hex.replace('#', '');
            if (c.length === 3) c = c.split('').map(ch => ch + ch).join('');
            const num = parseInt(c, 16);
            const r = (num >> 16) & 255, g = (num >> 8) & 255, b = num & 255;
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        const SIGIL_SVG = `
            <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                <rect x="30" y="4" width="36" height="36" transform="rotate(45 30 30)"/>
                <path d="M30 18 C24 26 24 32 30 42 C36 32 36 26 30 18 Z"/>
            </svg>
        `;

        function championCard(champ, gradient) {
            const [colorOne, colorTwo] = gradient;
            const accentVars = `--accent:${colorOne}; --accent-light:${colorTwo}; --accent-soft:${hexToRgba(colorOne, 0.25)};`;
            const cardClass = champ.missing ? 'champion-card is-missing' : 'champion-card';
            const missingStamp = champ.missing ? `<div class="missing-stamp" aria-hidden="true">Missing</div>` : '';
            return `
                <div class="${cardClass}" style="${accentVars}">
                    <span class="corner corner-tl" aria-hidden="true"></span>
                    <span class="corner corner-tr" aria-hidden="true"></span>
                    <span class="corner corner-bl" aria-hidden="true"></span>
                    <span class="corner corner-br" aria-hidden="true"></span>

                    <div class="crest">
                        <span class="crest-glow" aria-hidden="true"></span>
                        <span class="crest-shield-outer" aria-hidden="true"></span>
                        <div class="crest-shield">
                            <img src="${champ.avatar || 'images/default-avatar.jpg'}" alt="${champ.name} portrait" />
                        </div>
                        <svg class="crest-flame" viewBox="0 0 120 50" aria-hidden="true">
                            <path d="M60 50 C42 30 30 34 8 8 C30 16 46 10 60 30 C74 10 90 16 112 8 C90 34 78 30 60 50 Z" />
                        </svg>
                    </div>
                    ${missingStamp}

                    <div class="rank-ribbon">Champion</div>
                    <h3 class="champion-name">${champ.name}</h3>
                    <p class="champion-teammate">Paired with <b>${champ.teammate || 'Unknown'}</b></p>
                    <p class="champion-title">${champ.title || ''}</p>
                    <span class="card-pedestal" aria-hidden="true"></span>
                </div>
            `;
        }

        function regionBlock(regionKey, regionData) {
            const gradient = regionData.gradient || ["#ff5a2e", "#ffbf00"];
            return `
                <div class="region-block">
                    <div class="region-header">
                        <span class="region-flame" style="--flame-color:${gradient[0]}"></span>
                        <span class="region-name">${regionKey} Region</span>
                    </div>
                    <div class="region-cards">
                        ${regionData.champions.map(c => championCard(c, gradient)).join('')}
                    </div>
                </div>
            `;
        }

        function seasonBlock(seasonData) {
            const regionKeys = Object.keys(seasonData.regions);
            const el = document.createElement('section');
            el.className = 'season-block';
            el.innerHTML = `
                <div class="season-divider" aria-hidden="true">
                    <span class="season-crackline"></span>
                    <span class="season-sigil">${SIGIL_SVG}</span>
                    <span class="season-crackline"></span>
                </div>
                <div class="season-title-block">
                    <span class="season-eyebrow">Chapter ${String(seasonData.season).padStart(2, '0')}</span>
                    <h2 class="season-label">Season ${seasonData.season} Winners</h2>
                    <p class="season-subtitle">${seasonData.subtitle || ''}</p>
                </div>
                <div class="regions-grid">
                    ${regionKeys.map(key => regionBlock(key, seasonData.regions[key])).join('')}
                </div>
            `;
            return el;
        }

        const root = document.getElementById('seasons-root');
        hallOfAscendants
            .slice()
            .sort((a, b) => b.season - a.season)
            .forEach(seasonData => root.appendChild(seasonBlock(seasonData)));

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });
        document.querySelectorAll('.season-block').forEach(block => observer.observe(block));

        const embersContainer = document.getElementById('embers-container');
        for (let i = 0; i < 26; i++) {
            const ember = document.createElement('div');
            ember.className = 'ember' + (Math.random() > 0.5 ? ' ember-red' : '');
            ember.style.left = `${Math.random() * 100}vw`;
            ember.style.animationDuration = `${6 + Math.random() * 10}s`;
            ember.style.animationDelay = `${Math.random() * 6}s`;
            ember.style.opacity = Math.random() * 0.5 + 0.15;
            embersContainer.appendChild(ember);
        }
    </script>
</body>
</html>
